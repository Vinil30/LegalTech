<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Soven Legal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 2rem;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
            max-width: 600px;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #545b62;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <div class="logo-container">
            <h2 class="logo">Akaash Pandya</h2>
        </div>
        <ul>
            <li><a href="/dashboard"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> <span>Documents</span></a></li>
            <li><a href="/lawyers"><i class="fas fa-user-tie"></i> <span>Find Lawyers</span></a></li>
            <li><a href="/chat-interface"><i class="fas fa-comments"></i> <span>Messages</span></a></li>
            <li><a href="/legal-aid"><i class="fas fa-hands-helping"></i> <span>Legal Help</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <p>&copy; 2023 Soven Legal</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <h1>Error</h1>
        </header>

        <div class="error-container">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <h2 class="error-title">Oops! Something went wrong</h2>
            <p class="error-message">{{ message or "An unexpected error occurred. Please try again." }}</p>
            
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
                <a href="/dashboard" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go to Dashboard
                </a>
                <a href="/documents" class="btn btn-primary">
                    <i class="fas fa-file-alt"></i> Go to Documents
                </a>
            </div>
        </div>
    </div>
</body>
</html>
